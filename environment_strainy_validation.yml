name: strainy-validation
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python
  - python>=3.11

  # Strainy and its dependencies
  - strainy

  # Core strainphase dependencies
  - numpy>=1.20
  - scipy>=1.7
  - networkx>=2.6
  - pandas>=1.3
  - python-louvain>=0.16
  - pysam>=0.19

  # Visualization and plotting
  - matplotlib>=3.5
  - seaborn

  # BAM/VCF processing tools
  - samtools
  - bcftools
  - htslib

  # Optional but useful for benchmarking
  - minimap2
  - longshot

  # Development and testing
  - pytest>=7.0
  - pytest-cov>=4.0

  # Utilities
  - pip

  # Install strainphase via pip (in development mode)
  - pip:
    - -e /Users/reneeoles/Desktop/strainphase
